<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Create Account - Child Phone Tracker</title>
</head>
<body>
  <h1>Create Account (Consent Required)</h1>
  <form id="createForm">
    <label>Account name: <input id="name" required /></label><br/>
    <label>Owner email: <input id="email" type="email" /></label><br/>
    <button type="submit">Create Account</button>
  </form>

  <div id="result" style="margin-top:20px; white-space:pre-wrap;"></div>

  <script>
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const ownerEmail = document.getElementById('email').value;
      const res = await fetch('/api/accounts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, ownerEmail })
      });
      const json = await res.json();
      if (res.ok) {
        const shortLink = `${location.origin}/r/${json.token}`;
        document.getElementById('result').innerHTML = `Registration link (share with device owner):<br/><a href="${json.registrationLink}" target="_blank">${json.registrationLink}</a><br/><br/>Short universal link:<br/><a href="${shortLink}" target="_blank">${shortLink}</a><br/><br/>Token:<br/>${json.token}<br/><br/>QR code:`;
        // load QR image
        const img = document.createElement('img');
        img.src = `/api/accounts/${encodeURIComponent(json.token)}/qrcode`;
        img.alt = 'QR code';
        img.style.marginTop = '12px';
        document.getElementById('result').appendChild(img);
      } else {
        document.getElementById('result').textContent = `Error: ${json.error || JSON.stringify(json)}`;
      }
    });
  </script>
</body>
</html>
